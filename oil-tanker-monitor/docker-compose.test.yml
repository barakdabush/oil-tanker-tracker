version: '3.8'

services:
  db-test:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: oil_monitor_test
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - ./data/01_seed_init.sql:/docker-entrypoint-initdb.d/01_seed_init.sql:ro
      - ./data/02_seed_test.sql:/docker-entrypoint-initdb.d/02_seed_init_test.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d oil_monitor_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-test:
    build: ./backend
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db-test:5432/oil_monitor_test
      DATABASE_URL_SYNC: postgresql://admin:secret@db-test:5432/oil_monitor_test
      AIS_API_KEY: fake_api_key
      TEST_ENV: "true"
    ports:
      - "8002:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend-test:
    build: ./frontend
    depends_on:
      - backend-test
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8002
    command: npm run dev
