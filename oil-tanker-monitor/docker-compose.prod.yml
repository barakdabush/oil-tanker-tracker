version: '3.8'

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: oil_monitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d oil_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${USER_REPO_LOWERCASE}-backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/oil_monitor
      DATABASE_URL_SYNC: postgresql://admin:secret@db:5432/oil_monitor
      AIS_API_KEY: ${AIS_API_KEY}
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler:
    image: ghcr.io/${USER_REPO_LOWERCASE}-backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/oil_monitor
      DATABASE_URL_SYNC: postgresql://admin:secret@db:5432/oil_monitor
      AIS_API_KEY: ${AIS_API_KEY}
    command: python worker.py

  websocket:
    image: ghcr.io/${USER_REPO_LOWERCASE}-backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/oil_monitor
      DATABASE_URL_SYNC: postgresql://admin:secret@db:5432/oil_monitor
      AIS_API_KEY: ${AIS_API_KEY}
    ports:
      - "8001:8001"
    command: uvicorn websocket_app:app --host 0.0.0.0 --port 8001

  frontend:
    image: ghcr.io/${USER_REPO_LOWERCASE}-frontend:latest
    restart: always
    depends_on:
      - backend
      - websocket
    ports:
      - "3000:3000"
    environment:
      # Change YOUR_SERVER_IP to your VPS IP Address in the .env file
      NEXT_PUBLIC_API_URL: http://${SERVER_IP}:8000
      NEXT_PUBLIC_WS_URL: ws://${SERVER_IP}:8001

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    command: --interval 60

volumes:
  pgdata:
