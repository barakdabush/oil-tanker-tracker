version: '3.8'

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: oil_monitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d oil_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/oil_monitor
      DATABASE_URL_SYNC: postgresql://admin:secret@db:5432/oil_monitor
      AIS_API_KEY: ${AIS_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/oil_monitor
      DATABASE_URL_SYNC: postgresql://admin:secret@db:5432/oil_monitor
      AIS_API_KEY: ${AIS_API_KEY}
    volumes:
      - ./backend:/app
    command: python worker.py

  websocket:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/oil_monitor
      DATABASE_URL_SYNC: postgresql://admin:secret@db:5432/oil_monitor
      AIS_API_KEY: ${AIS_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    command: uvicorn websocket_app:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build: ./frontend
    depends_on:
      - backend
      - websocket
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
