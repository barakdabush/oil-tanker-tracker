name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Create lowercase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./oil-tanker-monitor/backend
          file: ./oil-tanker-monitor/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./oil-tanker-monitor/frontend
          file: ./oil-tanker-monitor/frontend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}-frontend:latest
